<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>銘於心-AI日報 · 過刊</title>
<style>
:root{--bg:#faf9f6;--text:#2d2d2d;--muted:#888;--border:#e8e5df;--accent:#d4a574}
[data-theme=dark]{--bg:#1a1a1a;--text:#e0ddd6;--muted:#999;--border:#333;--accent:#c9955e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);font-size:18px;line-height:1.8;max-width:740px;margin:0 auto;padding:40px 24px 80px}
header{text-align:center;padding:48px 0 36px;border-bottom:1px solid var(--border);margin-bottom:36px}
header h1{font-size:28px}
header a{color:var(--accent);text-decoration:none;font-size:15px}
.issue-list{list-style:none;padding:0}
.issue-list li{padding:14px 0;border-bottom:1px solid var(--border)}
.issue-list a{color:var(--accent);text-decoration:none;font-size:17px;font-weight:600}
.issue-list a:hover{text-decoration:underline}
footer{text-align:center;color:var(--muted);font-size:14px;margin-top:64px;padding-top:24px;border-top:1px solid var(--border)}
.theme-btn{position:fixed;bottom:16px;right:16px;width:36px;height:36px;border-radius:50%;z-index:100;background:transparent;border:1px solid var(--border);color:var(--text);cursor:pointer;font-size:14px}
</style>
</head>
<body>
<button class="theme-btn" onclick="toggleTheme()">🌓</button>
<header><h1>銘於心-AI日報</h1><a href="index.html">回到首頁</a></header>
<h2 style="margin-bottom:24px">歷史過刊</h2>
<ul class="issue-list"><li style="color:var(--muted)">尚無過刊</li></ul>
<footer>© 2026 銘於心 (MING). 智慧物聯架獲實驗室.</footer>
<script>
function toggleTheme(){var e=document.documentElement.dataset.theme=='light'?'dark':'light';document.documentElement.dataset.theme=e;localStorage.setItem('news-radar-theme',e)}
(function(){var e=localStorage.getItem('news-radar-theme');if(e)document.documentElement.dataset.theme=e})();
</script>
</body>
</html>
