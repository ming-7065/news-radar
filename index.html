<!DOCTYPE html>
<html lang="zh-Hant" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Radar · Web3+AI 日報</title>
<style>
:root {
  --bg: #faf9f6;
  --card-bg: #ffffff;
  --text: #2d2d2d;
  --muted: #888;
  --border: #e8e5df;
  --accent: #d4a574;
  --tag-bg: #f5f0e8;
  --tag-text: #8b7355;
  --score-bg: #faf5ef;
  --summary-bg: #fdfaf5;
}
[data-theme="dark"] {
  --bg: #1a1a1a;
  --card-bg: #242424;
  --text: #e0ddd6;
  --muted: #999;
  --border: #333;
  --accent: #c9955e;
  --tag-bg: #2a2520;
  --tag-text: #c9955e;
  --score-bg: #252220;
  --summary-bg: #282420;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", sans-serif;
  background: var(--bg); color: var(--text);
  font-size: 18px; line-height: 1.8;
  max-width: 740px; margin: 0 auto; padding: 32px 20px 80px;
}
header { text-align: center; padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
header h1 { font-size: 28px; font-weight: 700; letter-spacing: 0.04em; }
header p { color: var(--muted); font-size: 15px; margin-top: 6px; }
.day-meta { text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 40px; letter-spacing: 0.05em; }
.summary { background: var(--summary-bg); border-left: 3px solid var(--accent); padding: 20px 24px; margin-bottom: 40px; border-radius: 0 8px 8px 0; }
.summary h2 { font-size: 18px; margin-bottom: 10px; color: var(--accent); }
.summary p { font-size: 17px; line-height: 2; }
.section-title { font-size: 15px; font-weight: 600; letter-spacing: 0.08em; color: var(--muted); margin: 40px 0 20px; text-transform: uppercase; }
.article-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 24px; margin-bottom: 16px; transition: box-shadow .15s; }
.article-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.06); }
.article-card .hook { font-size: 15px; color: var(--accent); font-weight: 600; margin-bottom: 8px; letter-spacing: 0.03em; }
.article-card h3 { font-size: 19px; font-weight: 700; margin-bottom: 8px; line-height: 1.5; }
.article-card h3 a { color: var(--text); text-decoration: none; }
.article-card h3 a:hover { color: var(--accent); }
.article-card .desc { font-size: 16px; color: var(--muted); margin-bottom: 14px; line-height: 1.75; }
.article-card .meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
.article-card .score { background: var(--score-bg); color: var(--accent); padding: 2px 10px; border-radius: 12px; font-weight: 600; font-size: 13px; }
.article-card .tag { background: var(--tag-bg); color: var(--tag-text); padding: 2px 10px; border-radius: 4px; font-size: 12px; }
.source-link { color: var(--muted); text-decoration: underline; font-size: 13px; }
.source-link:hover { color: var(--accent); }
.hot-topics { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 40px; }
.hot-topic { background: var(--tag-bg); color: var(--accent); padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; }
.archive { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); }
.archive h3 { font-size: 16px; color: var(--muted); margin-bottom: 12px; }
.archive a { color: var(--accent); text-decoration: none; font-size: 15px; display: inline-block; margin-right: 16px; margin-bottom: 6px; }
.archive a:hover { text-decoration: underline; }
footer { text-align: center; color: var(--muted); font-size: 13px; margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border); }
.theme-toggle { position: fixed; top: 16px; right: 20px; background: none; border: 1px solid var(--border); border-radius: 20px; padding: 6px 14px; cursor: pointer; font-size: 14px; color: var(--text); }
@media (max-width: 600px) {
  body { padding: 16px 14px 60px; font-size: 16px; }
  header { padding: 24px 0 20px; }
  header h1 { font-size: 22px; }
  .article-card { padding: 18px; }
  .article-card h3 { font-size: 17px; }
}
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" aria-label="切換主題">🌓</button>
<header>
  <h1>News Radar</h1>
  <p>每天早 8 點，5 分鐘看懂 Web3 + AI</p>
</header>

<div class="day-meta" id="dayMeta"></div>
<div class="summary" id="summarySection"></div>

<div class="section-title">今日熱搜</div>
<div class="hot-topics" id="hotTopics"></div>

<div class="section-title">頭條新聞</div>
<div id="articles"></div>

<div class="archive" id="archiveSection"></div>

<footer>
  全自動化 n8n 新聞發佈平台 · AI 協作生成
</footer>

<script>
function toggleTheme() {
  const html = document.documentElement;
  const next = html.dataset.theme === 'light' ? 'dark' : 'light';
  html.dataset.theme = next;
  localStorage.setItem('news-radar-theme', next);
}
(function() {
  const saved = localStorage.getItem('news-radar-theme');
  if (saved) document.documentElement.dataset.theme = saved;
})();
</script>
</body>
</html>
